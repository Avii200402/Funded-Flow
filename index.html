<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>funded • step tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
    <div class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></div>

    <!-- MODAL for adding/editing account -->
    <div id="accountModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h2 id="modalTitle"><i class="fas fa-layer-plus"></i> Add account</h2>
                <button class="close-modal" id="closeModalBtn">&times;</button>
            </div>
            <div>
                <div style="font-weight: 700;">2 Step High Stake</div>
                <div class="size-selector">
                    <button class="size-btn" data-size="2500">2.5K</button>
                    <button class="size-btn active" data-size="5000">5K</button>
                </div>

                <div style="display: flex; align-items: center; margin: 16px 0;">
                    <span style="font-weight: 600;">Classic mode</span>
                    <label class="switch">
                        <input type="checkbox" id="classicToggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div id="ruleDetails" class="rule-list"></div>

                <input type="text" id="nickname" class="input-field" placeholder="Nick name" style="margin-bottom: 12px;">
                <input type="email" id="email" class="input-field" placeholder="Email" style="margin-bottom: 16px;">

                <select id="phaseSelect" class="input-field" style="margin-bottom: 20px;">
                    <option value="Phase 01">Phase 01</option>
                    <option value="Phase 02">Phase 02</option>
                    <option value="Funded !">Funded !</option>
                </select>

                <button class="btn" id="saveAccountBtn"><i class="fas fa-save"></i> Save account</button>
                <input type="hidden" id="editingIndex" value="-1">
            </div>
        </div>
    </div>

    <!-- PAGE 1 Dashboard -->
    <div id="page1" class="page active-page container">
        <div class="header-row">
            <div class="phase-chip" id="phaseNameDisplay"><i class="fas fa-flag"></i> Phase 01</div>
            <div class="account-mini" id="activeAccountChip"><i class="fas fa-user-circle"></i> <span id="activeAccountLabel">no account</span></div>
        </div>

        <!-- notification area -->
        <div id="notificationArea"></div>

        <div class="pl-toggle">
            <button class="pl-btn active" id="profitTab" data-pl="Profit"><i class="fas fa-arrow-up"></i> Profit</button>
            <button class="pl-btn" id="lossTab" data-pl="Loss"><i class="fas fa-arrow-down"></i> Loss</button>
        </div>

        <div class="card" style="display: flex; gap: 10px;">
            <input type="number" id="plInput" placeholder="0" class="input-field" style="flex:2;" min="0" step="1" disabled>
            <button id="addPlBtn" class="btn" style="flex:1; padding: 16px; background: var(--text-tertiary);" disabled><i class="fas fa-plus"></i> Add</button>
        </div>

        <div class="card">
            <div class="grid-2">
                <div><span class="stat-label">Profit Target</span><div class="stat-value" id="profitTarget">$500</div></div>
                <div><span class="stat-label">Max Loss</span><div class="stat-value loss" id="maxLoss">$500</div></div>
                <div><span class="stat-label">Total Profit</span><div class="stat-value profit" id="totalProfit">$0</div></div>
                <div><span class="stat-label">Profit Remaining</span><div class="stat-value profit" id="profitRemaining">$500</div></div>
                <div><span class="stat-label">Loss Remaining</span><div class="stat-value loss" id="lossRemaining">$500</div></div>
                <div><span class="stat-label">Win / loss rate</span><div class="stat-value" id="winLossRate">0%</div></div>
            </div>
        </div>

        <!-- linear meter 0-100% -->
        <div class="card">
            <div class="meter-container">
                <div class="meter-bar">
                    <div class="meter-profit" id="meterProfit" style="width: 0%;"></div>
                    <div class="meter-loss" id="meterLoss" style="width: 0%;"></div>
                </div>
                <div class="meter-labels">
                    <span class="profit" id="meterProfitLabel">0% profit</span>
                    <span class="loss" id="meterLossLabel">0% loss</span>
                </div>
            </div>
            <div id="winrateMessage" style="margin-top: 16px; font-weight: 600; text-align: center; min-height: 40px;"></div>
        </div>
    </div>

    <!-- PAGE 2 Account Management -->
    <div id="page2" class="page container">
        <h2 style="margin-bottom: 20px;"><i class="fas fa-address-book"></i> Accounts</h2>
        <button class="btn" id="openAddAccountBtn" style="margin-bottom: 24px;"><i class="fas fa-plus-circle"></i> Add account</button>
        <div id="accountsList" class="card" style="padding: 16px;">
            <div class="card-title">Saved accounts</div>
            <div id="accountsContainer"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" data-page="1"><i class="fas fa-chart-pie"></i><span>Dashboard</span></div>
        <div class="nav-item" data-page="2"><i class="fas fa-list"></i><span>Accounts</span></div>
    </div>

<script src="script.js" defer></script>
</body>
</html>
